apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toyota-demo.fullname" . }}
  labels:
    {{- include "toyota-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "toyota-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "toyota-demo.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "toyota-demo.fullname" . }}
            - secretRef:
                name: {{ include "toyota-demo.fullname" . }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
